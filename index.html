<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的雲端書櫃</title>

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="雲端書櫃">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#3a5a40">

    <link rel="apple-touch-icon" href="./icon.png">
    
    <link rel="manifest" href='data:application/manifest+json,{"name":"我的雲端書櫃","short_name":"雲端書櫃","start_url":".","display":"standalone","background_color":"#f2f0e9","theme_color":"#3a5a40","icons":[{"src":"./icon.png","sizes":"512x512","type":"image/png"}]}'>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        paper: '#f2f0e9', ink: '#373a36', sub: '#6b705c',
                        wood: { 100: '#e9e7da', 200: '#dad7cd', 300: '#a3b18a', 400: '#588157', 500: '#3a5a40', 600: '#344e41' },
                        sage: { 50: '#f0f4ef', 100: '#e0e9e1', 200: '#c5d5c5', 500: '#84a59d', 600: '#6b8a82', text: '#4a5d5a' },
                        dried: { 50: '#f7f2f2', 100: '#ede0e0', 200: '#d9bfbf', 500: '#b5838d', 600: '#a0717a', text: '#6d4c51' },
                        stone: { 50: '#f5f5f4', 100: '#e7e7e2', 200: '#dcdcc6', 400: '#a7a797', 500: '#7f7f6f', 600: '#5f5f54', text: '#4a4a40' },
                        gold: { 400: '#d4a373', 500: '#bc8a5f' }
                    }
                }
            }
        }
    </script>

    <style>
        /* 手機版文字放大 20% */
        @media (max-width: 768px) {
            html { font-size: 120%; }
        }
        /* 電腦版維持原樣 */
        @media (min-width: 769px) {
            html { font-size: 100%; }
        }

        body { font-family: 'Noto Sans TC', sans-serif; font-weight: 400; line-height: 1.3; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        .soft-shadow { box-shadow: 0 4px 12px -2px rgba(58, 90, 64, 0.08); }
        input, textarea, select { font-size: 0.95rem !important; font-weight: 400; font-style: normal !important; }
        .font-title { font-weight: 700; }
        /* 強制移除斜體 */
        em, i, .italic { font-style: normal !important; }
    </style>
</head>
<body class="bg-paper text-ink selection:bg-wood-200 selection:text-ink">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useMemo, useRef } from 'https://esm.sh/react@18.2.0';
        import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
        import { 
            BookOpen, Search, Plus, Trash2, BookCheck, BookX, Calendar, User, 
            LogIn, RefreshCw, TrendingUp, Link as LinkIcon, FileText, PenTool, 
            Trophy, Hourglass, Star, X, RotateCcw, AlertTriangle, LogOut, Edit3, 
            ChevronDown, ExternalLink, Pin, PinOff, ChevronUp, Lock, Copy
        } from 'https://esm.sh/lucide-react@0.344.0';
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, collection, addDoc, onSnapshot, doc, getDoc, updateDoc, deleteDoc, setDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        let firebaseConfig;
        try {
            firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
                apiKey: "AIzaSyDX1-Lwc5_u_fwV9P25xh32dVF8uVNT0QU", authDomain: "my-reading-tracker-58f69.firebaseapp.com",
                projectId: "my-reading-tracker-58f69", storageBucket: "my-reading-tracker-58f69.firebasestorage.app",
                messagingSenderId: "370802674969", appId: "1:370802674969:web:efb1c045e0028925154988", measurementId: "G-52EWLNG7ST"
            };
        } catch (e) {
            firebaseConfig = {
                apiKey: "AIzaSyDX1-Lwc5_u_fwV9P25xh32dVF8uVNT0QU", authDomain: "my-reading-tracker-58f69.firebaseapp.com",
                projectId: "my-reading-tracker-58f69", storageBucket: "my-reading-tracker-58f69.firebasestorage.app",
                messagingSenderId: "370802674969", appId: "1:370802674969:web:efb1c045e0028925154988", measurementId: "G-52EWLNG7ST"
            };
        }

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'my-reading-app';
        const ESTIMATE_WORDS_PER_PAGE = 350;
        const DEFAULT_CATEGORIES = ["玄幻", "奇幻", "武俠", "仙俠", "都市", "言情", "古代", "架空", "科幻", "懸疑", "推理", "驚悚", "耽美", "百合", "穿越", "重生", "系統", "末世", "種田"];

        const StarRating = ({ rating, setRating, interactive = false, size = 16 }) => (
            <div className="flex gap-1">
                {[1, 2, 3, 4, 5].map((index) => {
                    const filled = rating >= index;
                    const half = rating >= index - 0.5 && !filled;
                    return (
                        <div key={index} className={`relative ${interactive ? 'cursor-pointer' : ''}`}
                            onClick={(e) => {
                                if (!interactive) return;
                                const rect = e.currentTarget.getBoundingClientRect();
                                setRating((e.clientX - rect.left) < rect.width / 2 ? index - 0.5 : index);
                            }}>
                            <Star size={interactive ? 24 : size} className="text-stone-200" />
                            <div className="absolute top-0 left-0 overflow-hidden" style={{ width: filled ? '100%' : half ? '50%' : '0%' }}>
                                <Star size={interactive ? 24 : size} className="fill-gold-400 text-gold-400" />
                            </div>
                        </div>
                    );
                })}
            </div>
        );

        const CategoryPicker = ({ selectedCategories, onToggle, allCategories, onAddNew, onDelete }) => {
            const [isOpen, setIsOpen] = useState(false);
            const [filterText, setFilterText] = useState('');
            const filtered = useMemo(() => allCategories.filter(c => c.toLowerCase().includes(filterText.toLowerCase())), [allCategories, filterText]);
            const handleKeyDown = async (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    const tags = filterText.trim().split(/[，,\s]+/).filter(t => t !== "");
                    for (const tag of tags) { 
                        if (!selectedCategories.includes(tag)) { 
                            if (allCategories.includes(tag)) {
                                onToggle(tag); 
                            } else {
                                await onAddNew(tag); 
                                onToggle(tag); 
                            }
                        } 
                    }
                    setFilterText('');
                }
            };
            return (
                <div className="w-full">
                    <div className="flex flex-wrap gap-2 items-center p-1 border-b border-stone-200 font-normal">
                        {selectedCategories.map(cat => (
                            <span key={cat} className="bg-wood-400 text-white text-[10px] px-2 py-0.5 rounded-full flex items-center gap-1">
                                {cat} <X size={10} className="cursor-pointer" onClick={() => onToggle(cat)}/>
                            </span>
                        ))}
                        <button type="button" onClick={() => setIsOpen(!isOpen)} className="text-[10px] text-wood-500 hover:bg-wood-100 px-2 py-1 rounded-full transition-colors flex items-center gap-1">
                            {isOpen ? '收起' : <><Plus size={10}/> 選擇分類</>}
                        </button>
                    </div>
                    {isOpen && (
                        <div className="mt-2 p-3 bg-white rounded-xl border border-stone-200 animate-fade-in relative z-10">
                            <input placeholder="搜尋或新增..." value={filterText} onChange={e => setFilterText(e.target.value)} onKeyDown={handleKeyDown} className="w-full mb-2 p-1.5 border rounded-lg text-xs outline-none" />
                            <div className="flex flex-wrap gap-1.5 max-h-32 overflow-y-auto no-scrollbar">
                                {filtered.map(cat => (
                                    <div key={cat} className="group relative">
                                        <button type="button" onClick={() => onToggle(cat)} className={`text-[10px] px-2 py-1 rounded-full border transition ${selectedCategories.includes(cat) ? 'bg-wood-500 text-white' : 'bg-white text-stone-600 border-stone-200'}`}>{cat}</button>
                                        <button type="button" onClick={(e) => { e.stopPropagation(); if(confirm(`刪除「${cat}」？`)) onDelete(cat, e); }} className="absolute -top-1 -right-1 bg-white text-stone-300 rounded-full p-0.5 border border-stone-100 opacity-0 group-hover:opacity-100"><X size={8}/></button>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const linkifyText = (text) => {
            if (!text) return null;
            const urlRegex = /(https?:\/\/[^\s]+)/g;
            const parts = text.split(urlRegex);
            return parts.map((part, i) => {
                if (part.match(urlRegex)) {
                    return (
                        <a key={i} href={part} target="_blank" rel="noopener noreferrer" className="text-wood-500 hover:underline break-all">
                            {part}
                        </a>
                    );
                }
                return part;
            });
        };

        function App() {
            const [user, setUser] = useState(null);
            const [books, setBooks] = useState([]);
            const [categories, setCategories] = useState(DEFAULT_CATEGORIES);
            const [loading, setLoading] = useState(true);
            const [customId, setCustomId] = useState('');
            const [loginPassword, setLoginPassword] = useState('');
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [toast, setToast] = useState(null);
            const [searchTerm, setSearchTerm] = useState('');
            const [statusFilter, setStatusFilter] = useState('all');
            const [yearFilter, setYearFilter] = useState(null);
            const [ratingFilter, setRatingFilter] = useState(0);
            const [wordCountFilter, setWordCountFilter] = useState('all');
            const [isAddFormOpen, setIsAddFormOpen] = useState(false);
            const [isSearching, setIsSearching] = useState(false);
            const [isRatingMenuOpen, setIsRatingMenuOpen] = useState(false);
            const [isWordCountMenuOpen, setIsWordCountMenuOpen] = useState(false);
            const [modalType, setModalType] = useState(null);
            const [editingId, setEditingId] = useState(null);
            const [inlineActionId, setInlineActionId] = useState(null);
            const [inlineData, setInlineData] = useState({});
            const [editForm, setEditForm] = useState({});
            const [expandedBooks, setExpandedBooks] = useState({});
            const [newBook, setNewBook] = useState({ title: '', author: '', wordCount: '', isWordCountManual: false, addDate: new Date().toISOString().split('T')[0], reviewUrl: '', synopsis: '', category: [], isPinned: false, isReadingNow: false });
            
            const searchInputRef = useRef(null);

            useEffect(() => {
                const initApp = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await signInWithCustomToken(auth, __initial_auth_token);
                        else await signInAnonymously(auth);
                    } catch (err) { console.error("Auth Failed:", err); }

                    const sid = localStorage.getItem('reading_tracker_id');
                    const spw = localStorage.getItem('reading_tracker_pw');

                    if (sid && spw) {
                        try {
                            const settingsRef = doc(db, 'artifacts', appId, 'public', 'data', `reading_list_${sid}`, 'settings');
                            const settingsSnap = await getDoc(settingsRef);
                            
                            if (settingsSnap.exists() && settingsSnap.data().password === spw) {
                                setCustomId(sid);
                                setLoginPassword(spw);
                                setIsLoggedIn(true);
                            } else {
                                localStorage.removeItem('reading_tracker_id');
                                localStorage.removeItem('reading_tracker_pw');
                                setCustomId('');
                                setLoginPassword('');
                            }
                        } catch (e) {
                            console.error("Session verification failed", e);
                        }
                    }
                    setLoading(false);
                };

                initApp();
                const unsubscribe = onAuthStateChanged(auth, (curr) => {
                    setUser(curr);
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user || !isLoggedIn || !customId) { 
                    return; 
                }
                const collectionRef = collection(db, 'artifacts', appId, 'public', 'data', `reading_list_${customId}`);
                const unsub = onSnapshot(collectionRef, (snapshot) => {
                    const list = [];
                    let fetchedCats = [...DEFAULT_CATEGORIES];
                    snapshot.docs.forEach(doc => {
                        if (doc.id === 'settings') { if (doc.data().categories) fetchedCats = doc.data().categories; }
                        else list.push({ id: doc.id, ...doc.data() });
                    });
                    setCategories(fetchedCats);
                    
                    const sorted = list.sort((a, b) => {
                        const readingNowA = !!a.isReadingNow;
                        const readingNowB = !!b.isReadingNow;
                        if (readingNowA !== readingNowB) return readingNowA ? -1 : 1;

                        const pinA = !!a.isPinned;
                        const pinB = !!b.isPinned;
                        if (pinA !== pinB) return pinA ? -1 : 1;
                        
                        const getSortValue = (item) => {
                            let dateVal = item.addDate;
                            if (item.status === 'finished') dateVal = item.finishDate || item.addDate;
                            else if (item.status === 'dropped') dateVal = item.dropDate || item.addDate;
                            if (!dateVal || typeof dateVal !== 'string') return 0;
                            const match = dateVal.match(/(\d+)/g);
                            if (match && match.length > 0) {
                                const y = parseInt(match[0], 10) || 0;
                                const m = match.length > 1 ? parseInt(match[1], 10) : 0;
                                const d = match.length > 2 ? parseInt(match[2], 10) : 0;
                                return y * 10000 + m * 100 + d;
                            }
                            return 0;
                        };
                        
                        const valA = getSortValue(a);
                        const valB = getSortValue(b);
                        if (valA !== valB) return valB - valA; 
                        return (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0);
                    });
                    
                    setBooks(sorted);
                }, (error) => {
                    console.error("Snapshot error:", error);
                });
                return () => unsub();
            }, [user, isLoggedIn, customId]);

            const showToast = (message, type = 'info') => { setToast({ message, type }); setTimeout(() => setToast(null), 3000); };
            
            const handleLogin = async (e) => {
                e.preventDefault();
                const id = customId.trim();
                const pw = loginPassword.trim();

                if (id.length < 3) return showToast("ID 過短", "error");
                if (pw.length === 0) return showToast("請輸入密碼", "error");

                setIsSearching(true);
                try {
                    const settingsRef = doc(db, 'artifacts', appId, 'public', 'data', `reading_list_${id}`, 'settings');
                    const settingsSnap = await getDoc(settingsRef);

                    if (settingsSnap.exists() && settingsSnap.data().password) {
                        if (settingsSnap.data().password !== pw) {
                            showToast("密碼錯誤", "error");
                            setIsSearching(false);
                            return;
                        }
                    } else {
                        await setDoc(settingsRef, { password: pw }, { merge: true });
                        showToast("已為此 ID 設定新密碼");
                    }

                    localStorage.setItem('reading_tracker_id', id);
                    localStorage.setItem('reading_tracker_pw', pw);
                    setIsLoggedIn(true);
                } catch (err) {
                    console.error(err);
                    showToast("驗證失敗", "error");
                } finally {
                    setIsSearching(false);
                }
            };

            const searchBookInfo = async (target, setter) => {
                if (!target.title) return;
                setIsSearching(true);
                try {
                    const res = await fetch(`https://www.googleapis.com/books/v1/volumes?q=intitle:${target.title}${target.author ? `+inauthor:${target.author}` : ''}&maxResults=1`);
                    const data = await res.json();
                    if (data.items?.length > 0) {
                        const info = data.items[0].volumeInfo;
                        setter(prev => ({ ...prev, author: prev.author || info.authors?.[0] || '', wordCount: (info.pageCount || 0) * ESTIMATE_WORDS_PER_PAGE, synopsis: info.description || '' }));
                        showToast("找到資料！");
                    } else showToast("無搜尋結果", "error");
                } catch (err) { showToast("搜尋失敗", "error"); } finally { setIsSearching(false); }
            };

            const handleUpdateCategories = async (newCats) => {
                setCategories(newCats);
                const settingsRef = doc(db, 'artifacts', appId, 'public', 'data', `reading_list_${customId}`, 'settings');
                await setDoc(settingsRef, { categories: newCats }, { merge: true });
            };

            const stats = useMemo(() => {
                const res = { reading: 0, finished: 0, dropped: 0, years: {} };
                books.forEach(b => {
                    if (b.status === 'reading') res.reading++;
                    else {
                        if (b.status === 'finished') res.finished++; else res.dropped++;
                        const rawDate = b.status === 'finished' ? b.finishDate : b.dropDate;
                        if (rawDate) {
                            const y = rawDate.split(/[-/]/)[0];
                            if (y && y.length === 4) {
                                if (!res.years[y]) res.years[y] = { f: 0, d: 0 };
                                if (b.status === 'finished') res.years[y].f++; else res.years[y].d++;
                            }
                        }
                    }
                });
                return { ...res, sortedYears: Object.keys(res.years).sort((a, b) => b - a) };
            }, [books]);

            const filteredBooks = useMemo(() => {
                // 將關鍵字以空格切分並過濾空值
                const terms = searchTerm.toLowerCase().split(/\s+/).filter(t => t !== '');
                return books.filter(b => {
                    const matchStatus = statusFilter === 'all' || b.status === statusFilter;
                    const matchRating = ratingFilter === 0 || (b.rating || 0) >= ratingFilter;
                    
                    // 必須符合所有切分出來的關鍵字
                    const matchTerms = terms.length === 0 || terms.every(term => 
                        b.title.toLowerCase().includes(term) || 
                        b.author?.toLowerCase().includes(term) || 
                        b.category?.some(c => c.toLowerCase().includes(term))
                    );

                    let matchYear = true;
                    if (yearFilter) {
                        const bDate = b.status === 'finished' ? b.finishDate : (b.status === 'dropped' ? b.dropDate : null);
                        matchYear = bDate && bDate.startsWith(yearFilter);
                    }

                    let matchWordCount = true;
                    if (wordCountFilter !== 'all') {
                        const wc = Number(b.wordCount) || 0;
                        if (wordCountFilter === 'under30') matchWordCount = wc < 300000;
                        else if (wordCountFilter === '30to50') matchWordCount = wc >= 300000 && wc < 500000;
                        else if (wordCountFilter === '50to100') matchWordCount = wc >= 500000 && wc < 1000000;
                        else if (wordCountFilter === 'over100') matchWordCount = wc >= 1000000;
                    }

                    return matchStatus && matchRating && matchTerms && matchYear && matchWordCount;
                });
            }, [books, statusFilter, ratingFilter, searchTerm, yearFilter, wordCountFilter]);

            const updateBook = async (id, data) => {
                const bookRef = doc(db, 'artifacts', appId, 'public', 'data', `reading_list_${customId}`, id);
                await updateDoc(bookRef, data);
                setEditingId(null); 
                setInlineActionId(null);
                showToast("更新成功");
            };

            const handleInlineSubmit = async (id, type) => {
                let updates = {};
                if (type === 'finish') {
                    updates = { status: 'finished', finishDate: inlineData.date, rating: inlineData.rating || 0, review: inlineData.review || '', isPinned: false, isReadingNow: false };
                } else if (type === 'drop') {
                    updates = { status: 'dropped', dropChapter: inlineData.chapter, dropDate: inlineData.date, dropReason: inlineData.dropReason || '', isPinned: false, isReadingNow: false };
                }
                await updateBook(id, updates);
            };

            const addBook = async (e) => {
                e.preventDefault();
                if (!newBook.title) return;
                try {
                    const collectionRef = collection(db, 'artifacts', appId, 'public', 'data', `reading_list_${customId}`);
                    await addDoc(collectionRef, { ...newBook, status: 'reading', createdAt: serverTimestamp() });
                    setNewBook({ title: '', author: '', wordCount: '', isWordCountManual: false, addDate: new Date().toISOString().split('T')[0], reviewUrl: '', synopsis: '', category: [], isPinned: false, isReadingNow: false });
                    setIsAddFormOpen(false);
                    showToast("新增成功！");
                } catch (err) { showToast("儲存失敗", "error"); }
            };

            const openExternalSearch = (title, author) => {
                if (!title) return;
                const query = author ? `${title} ${author}` : title;
                const url = `https://www.google.com/search?q=${encodeURIComponent(query)}`;
                const a = document.createElement('a');
                a.href = url;
                a.target = '_blank';
                a.rel = 'noopener noreferrer';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            };

            const renderReviewLink = (url) => {
                if (!url) return null;
                return (
                    <div className="mt-1 flex items-start gap-1.5 text-[10px] whitespace-pre-wrap">
                        <LinkIcon size={10} className="text-wood-400 mt-0.5 shrink-0" />
                        <div className="text-sub opacity-80 flex-1 font-normal">
                            {linkifyText(url)}
                        </div>
                    </div>
                );
            };

            const clearSearch = () => {
                setSearchTerm('');
                if (searchInputRef.current) {
                    searchInputRef.current.focus();
                }
            };

            const handleCopyFilteredList = () => {
                if (filteredBooks.length === 0) {
                    showToast("目前清單沒有可複製的內容", "error");
                    return;
                }
                const textToCopy = filteredBooks.map(b => `《${b.title}》${b.author || '佚名'}`).join('\n');
                navigator.clipboard.writeText(textToCopy).then(() => {
                    showToast("清單文字已複製！");
                }).catch(() => {
                    showToast("複製失敗", "error");
                });
            };

            if (loading) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-paper text-stone-400 font-normal">
                        <div className="text-center space-y-4">
                            <RefreshCw className="animate-spin mx-auto text-wood-300" size={32} />
                            <p className="text-sm tracking-widest">載入書櫃中...</p>
                        </div>
                    </div>
                );
            }

            if (!isLoggedIn) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-6 bg-paper animate-fade-in">
                        <div className="bg-white p-10 rounded-[2.5rem] shadow-xl w-full max-md text-center border border-stone-200">
                            <BookOpen size={64} className="mx-auto text-wood-300 mb-6" />
                            <h1 className="text-4xl font-title mb-2 tracking-widest text-ink">雲端書櫃</h1>
                            <p className="text-sub mb-8 text-sm">輸入 ID 與密碼開啟閱讀空間</p>
                            <form onSubmit={handleLogin} className="space-y-4">
                                <div className="space-y-2">

                                                                <div className="flex flex-col items-center justify-end pb-1"><StarRating rating={inlineData.rating || 0} setRating={r => setInlineData({...inlineData, rating: r})} interactive={true} size={14} /></div>
                                                            </div>
                                                            <textarea value={inlineData.review} onChange={e=>setInlineData({...inlineData, review:e.target.value})} className="w-full p-2 text-xs border rounded-lg h-24 resize-none min-w-0" />
                                                        </div>
                                                    ) : (
                                                        <div className="space-y-3">
                                                            <div className="grid grid-cols-2 gap-2">
                                                                <div className="flex flex-col gap-0.5">
                                                                    <label className="text-xs text-sub font-normal">日期</label>
                                                                    <input type="date" value={inlineData.date} onChange={e=>setInlineData({...inlineData, date:e.target.value})} className="w-full px-1.5 py-1 text-[10px] tracking-tighter border rounded-lg h-8 min-w-0" />
                                                                </div>
                                                                <div className="flex flex-col gap-0.5">
                                                                    <label className="text-xs text-sub font-normal">章節</label>
                                                                    <input value={inlineData.chapter} onChange={e=>setInlineData({...inlineData, chapter:e.target.value})} className="w-full p-1.5 text-xs border rounded-lg h-8 min-w-0" />
                                                                </div>
                                                            </div>
                                                            <div className="flex flex-col gap-0.5">
                                                                <label className="text-xs text-sub font-normal">棄書理由</label>
                                                                <textarea value={inlineData.dropReason} onChange={e=>setInlineData({...inlineData, dropReason:e.target.value})} className="w-full p-2 text-xs border rounded-lg h-16 resize-none min-w-0" />
                                                            </div>
                                                        </div>
                                                    )}
                                                    <div className="flex justify-end">
                                                        <button onClick={() => handleInlineSubmit(book.id, modalType)} className="bg-wood-500 text-white px-4 py-1.5 rounded-lg text-xs font-title">確認更新</button>
                                                    </div>
                                                </div>
                                            )}

                                            {book.synopsis && <button onClick={()=>setExpandedBooks(p=>({...p,[book.id]:!p[book.id]}))} className="text-xs text-stone-400 flex items-center gap-1 font-normal mt-1"><FileText size={12}/> 大綱</button>}
                                            {expandedBooks[book.id] && <div className="text-xs text-sub bg-stone-50 p-2 rounded-lg mt-1 whitespace-pre-wrap font-normal max-h-40 overflow-y-auto">{linkifyText(book.synopsis)}</div>}
                                        </>
                                    )}
                                </div>
                                <div className="flex flex-row md:flex-col gap-2 justify-end shrink-0 md:w-10 font-normal">
                                    <button onClick={() => { setEditingId(book.id); setEditForm({...book}); }} className="h-9 w-9 md:h-10 md:w-10 flex items-center justify-center text-stone-300 hover:text-wood-500 bg-stone-50 rounded-xl" title="編輯基本資料"><Edit3 size={18}/></button>
                                    {book.status === 'reading' ? (
                                        <>
                                            <button onClick={(e) => { e.stopPropagation(); updateBook(book.id, { isReadingNow: !book.isReadingNow }); }} className={`h-9 w-9 md:h-10 md:w-10 flex items-center justify-center rounded-xl border ${book.isReadingNow ? 'bg-sage-500 text-white border-sage-600' : 'bg-white text-stone-300 border-stone-100'} font-normal`} title="標記正在閱讀"><BookOpen size={16}/></button>
                                            <button onClick={() => { setInlineActionId(book.id); setModalType('finish'); setInlineData({ date: book.finishDate, rating: book.rating || 0, review: book.review || '' }); }} className="h-9 w-9 md:h-10 md:w-10 flex items-center justify-center text-sage-600 bg-sage-50 rounded-xl border border-sage-100" title="完食"><BookCheck size={18}/></button>
                                            <button onClick={() => { setInlineActionId(book.id); setModalType('drop'); setInlineData({ date: book.dropDate, chapter: book.dropChapter || '', dropReason: book.dropReason || '' }); }} className="h-9 w-9 md:h-10 md:w-10 flex items-center justify-center text-dried-500 bg-dried-50 rounded-xl border border-dried-100" title="棄書"><BookX size={18}/></button>
                                        </>
                                    ) : <button onClick={() => updateBook(book.id, { status:'reading', finishDate:null, dropChapter:null, dropDate:null, rating:null, review:null, dropReason:null, isReadingNow: false })} className="h-9 w-9 md:h-10 md:w-10 flex items-center justify-center text-stone-400 bg-stone-50 rounded-xl font-normal" title="恢復閱讀狀態/重讀"><RotateCcw size={18}/></button>}
                                    <button onClick={(e) => { e.stopPropagation(); updateBook(book.id, { isPinned: !book.isPinned }); }} className={`h-9 w-9 md:h-10 md:w-10 flex items-center justify-center rounded-xl border ${book.isPinned ? 'bg-wood-500 text-white border-wood-600' : 'bg-white text-stone-300 border-stone-100'} font-normal`} title="置頂">{book.isPinned ? <PinOff size={16}/> : <Pin size={16}/>}</button>
                                    <button onClick={() => { if(confirm('刪除？')) deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', `reading_list_${customId}`, book.id)); }} className="h-9 w-9 md:h-10 md:w-10 flex items-center justify-center text-stone-200 hover:text-dried-500 font-normal" title="刪除"><Trash2 size={16}/></button>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
